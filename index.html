<!DOCTYPE html>
<html>
<head>

<title>Mental Health Prediction</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card p-4 shadow">

<h2 class="text-center mb-4">Mental Health Prediction</h2>

<form action="/predict" method="post">

<label>Age</label>
<input type="number" name="age" class="form-control" required>

<label class="mt-2">Gender</label>
<select name="gender" class="form-control">
<option value="0">Male</option>
<option value="1">Female</option>
</select>

<label class="mt-2">Family History</label>
<select name="family_history" class="form-control">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label class="mt-2">Work Interference</label>
<select name="work_interfere" class="form-control">
<option value="0">Never</option>
<option value="1">Rarely</option>
<option value="2">Sometimes</option>
<option value="3">Often</option>
</select>

<label class="mt-2">Remote Work</label>
<select name="remote_work" class="form-control">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label class="mt-2">Tech Company</label>
<select name="tech_company" class="form-control">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label class="mt-2">Benefits</label>
<select name="benefits" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">Don't Know</option>
</select>

<label class="mt-2">Care Options</label>
<select name="care_options" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">Not Sure</option>
</select>

<label class="mt-2">Wellness Program</label>
<select name="wellness_program" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">Don't Know</option>
</select>

<label class="mt-2">Seek Help</label>
<select name="seek_help" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">Don't Know</option>
</select>

<label class="mt-2">Anonymity</label>
<select name="anonymity" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">Don't Know</option>
</select>

<label class="mt-2">Leave Policy</label>
<select name="leave" class="form-control">
<option value="0">Very Difficult</option>
<option value="1">Somewhat Difficult</option>
<option value="2">Easy</option>
</select>

<label class="mt-2">Coworker Support</label>
<select name="coworkers" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">Some of Them</option>
</select>

<br>

<div class="text-center">
<button class="btn btn-primary">Predict</button>
</div>

</form>

</div>

</div>

</body>
</html>
